# @package _global_
generation:
  type: adaption
  prompt_template: "You are a helpful assistant. Generate a detailed response for: {text}"
  num_samples: 100
  output_format: jsonl
  deduplicate: true
  save_intermediate: true
  adaption_api:
    endpoint: ${oc.env:ADAPTION_API_ENDPOINT,https://api.adaption.ai}
    api_key: ${oc.env:ADAPTION_API_KEY,}
    model: adaption-v1
    max_tokens: 512
    temperature: 0.7
